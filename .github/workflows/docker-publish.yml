name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: true
        type: string

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: yukagano/wiremock-hub
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      version: ${{ steps.resolve.outputs.version }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format '${VERSION}'. Expected semver (e.g. 0.2.0)"
              exit 1
            fi
            TAG_NAME="v${VERSION}"
            if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
              echo "::error::Tag ${TAG_NAME} already exists"
              exit 1
            fi
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if release exists
        id: check-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ needs.prepare.outputs.tag_name }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ needs.prepare.outputs.tag_name }} \
            --generate-notes \
            --title "Release ${{ needs.prepare.outputs.tag_name }}"

  build-allinone-platform:
    needs: [prepare, create-release]
    name: Build All-in-One (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set platform suffix
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_SUFFIX=${PLATFORM_PAIR//\//-}
          echo "suffix=${PLATFORM_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and push platform-specific image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./allinone/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag_name }}-${{ steps.platform.outputs.suffix }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.tag_name }}-${{ steps.platform.outputs.suffix }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=allinone-${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=allinone-${{ steps.platform.outputs.suffix }}

  create-allinone-manifest:
    needs: [prepare, build-allinone-platform]
    name: Create All-in-One Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest for GHCR
        run: |
          docker buildx imagetools create -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.minor }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.major }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag_name }}-linux-amd64 \
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag_name }}-linux-arm64

      - name: Create and push multi-arch manifest for Docker Hub
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tags.outputs.version }} \
            -t ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tags.outputs.minor }} \
            -t ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tags.outputs.major }} \
            -t ${{ env.DOCKERHUB_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.tag_name }}-linux-amd64 \
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.tag_name }}-linux-arm64

  build-standalone-platform:
    needs: [prepare, create-release]
    name: Build Standalone (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set platform suffix
        id: platform
        run: |
          PLATFORM_PAIR=${{ matrix.platform }}
          PLATFORM_SUFFIX=${PLATFORM_PAIR//\//-}
          echo "suffix=${PLATFORM_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build and push platform-specific image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ needs.prepare.outputs.tag_name }}-${{ steps.platform.outputs.suffix }}
            ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ needs.prepare.outputs.tag_name }}-${{ steps.platform.outputs.suffix }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=standalone-${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=standalone-${{ steps.platform.outputs.suffix }}

  create-standalone-manifest:
    needs: [prepare, build-standalone-platform]
    name: Create Standalone Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest for GHCR
        run: |
          docker buildx imagetools create -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ steps.tags.outputs.version }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ steps.tags.outputs.minor }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ steps.tags.outputs.major }} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ needs.prepare.outputs.tag_name }}-linux-amd64 \
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-standalone:${{ needs.prepare.outputs.tag_name }}-linux-arm64

      - name: Create and push multi-arch manifest for Docker Hub
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ steps.tags.outputs.version }} \
            -t ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ steps.tags.outputs.minor }} \
            -t ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ steps.tags.outputs.major }} \
            -t ${{ env.DOCKERHUB_IMAGE }}-standalone:latest \
            ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ needs.prepare.outputs.tag_name }}-linux-amd64 \
            ${{ env.DOCKERHUB_IMAGE }}-standalone:${{ needs.prepare.outputs.tag_name }}-linux-arm64
